<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{
  background-color:#0a0122;
  background-image:radial-gradient(120% 80% at 50% 0%, #3a0d5c 0%, #220646 35%, #110223 70%, #07001a 100%);
  background-repeat:no-repeat;
  height:100%;width:100%;
  overflow:hidden;
}
body{
  height:100%;width:100%;
  overflow:hidden;
  overscroll-behavior:none;
  position:fixed;inset:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  color:#fff;
  background-color:#0a0122;
  background-image:
    radial-gradient(60% 40% at 10% 15%, rgba(236, 72, 153, .18), transparent 60%),
    radial-gradient(55% 35% at 90% 85%, rgba(139, 92, 246, .22), transparent 60%),
    radial-gradient(120% 80% at 50% 0%, #3a0d5c 0%, #220646 35%, #110223 70%, #07001a 100%);
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}
.app{
  position:relative;z-index:1;
  height:100%;height:100dvh;
  display:flex;flex-direction:column;
  padding:max(10px,env(safe-area-inset-top)) 16px max(10px,env(safe-area-inset-bottom));
  gap:10px;
}
/* ---- TITLE ---- */
.hero{flex:0 0 auto;text-align:center;padding:2px 6px 0}
h1{
  font-size:clamp(18px,5.4vw,24px);
  font-weight:800;line-height:1.15;letter-spacing:-.01em;
  color:#fff;
  text-shadow:0 2px 24px rgba(236,72,153,.35),0 1px 2px rgba(0,0,0,.6);
}
h1 .grad{
  background:linear-gradient(90deg,#fff 0%,#fce7f3 50%,#f9a8d4 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
/* ---- CAROUSEL ---- */
.carousel-wrap{flex:1 1 auto;min-height:0;position:relative}
.carousel{
  height:100%;
  display:flex;gap:14px;
  overflow-x:auto;overflow-y:hidden;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
  padding:4px 22vw 4px 22vw;
  scrollbar-width:none;
}
.carousel::-webkit-scrollbar{display:none}
.slide{
  flex:0 0 56vw;max-width:280px;
  height:100%;
  scroll-snap-align:center;
  position:relative;
  border-radius:22px;
  overflow:hidden;
  background:#1a0830;
  box-shadow:
    0 20px 50px -15px rgba(0,0,0,.75),
    0 0 0 1px rgba(236,72,153,.22),
    0 0 40px -10px rgba(236,72,153,.35);
  transform:translateZ(0);
}
.slide picture{display:block;width:100%;height:100%}
.slide img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  pointer-events:none;
}
.slide::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 70%,rgba(12,2,26,.55) 100%);
}
/* dots */
.dots{
  position:absolute;left:0;right:0;bottom:-2px;
  display:flex;justify-content:center;gap:5px;
  pointer-events:none;
}
.dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.28);
  transition:background .25s ease,width .25s ease;
}
.dot.active{background:#ec4899;width:16px;border-radius:3px}

/* ---- INSTALL REGION ---- */
.install{flex:0 0 auto;position:relative;display:flex;flex-direction:column;gap:8px}
.install-view{display:flex;flex-direction:column;gap:8px;animation:fadeUp .28s cubic-bezier(.2,.7,.2,1) both}
.install-view[hidden]{display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Both top-level buttons share the same row geometry */
.btn{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;
  text-decoration:none;color:#fff;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  box-shadow:0 6px 18px -10px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04) inset;
  transition:transform .12s ease, box-shadow .25s ease, border-color .2s ease;
  cursor:pointer;font:inherit;
  -webkit-tap-highlight-color:transparent;
  width:100%;
}
.btn:active{transform:scale(.98)}
.btn-ico{
  flex:0 0 auto;
  width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
}
.btn-ico svg{width:24px;height:24px;display:block}
.btn-body{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;line-height:1.2;text-align:left}
.btn-title{font-size:15px;font-weight:700;color:#fff}
.btn-hint{font-size:11px;font-weight:500;color:rgba(255,255,255,.62);margin-top:2px}
.btn-chev{
  flex:0 0 auto;
  font-size:13px;color:rgba(255,255,255,.7);
  transition:transform .25s ease;
  display:inline-block;
}

/* Apple = primary pulsing CTA */
.btn--apple{
  background:linear-gradient(135deg,#f472b6 0%,#ec4899 50%,#db2777 100%);
  border-color:rgba(255,255,255,.18);
  box-shadow:
    0 10px 28px -8px rgba(236,72,153,.7),
    0 0 0 1px rgba(255,255,255,.12) inset;
  position:relative;overflow:hidden;isolation:isolate;
  animation:pulse 2.4s ease-in-out infinite;
}
.btn--apple::before{
  content:"";position:absolute;inset:0;z-index:-1;
  background:linear-gradient(120deg,transparent 20%,rgba(255,255,255,.45) 50%,transparent 80%);
  transform:translateX(-120%);
  animation:shine 2.8s ease-in-out infinite;
}
.btn--apple .btn-hint{color:rgba(255,255,255,.85)}
.btn--apple .btn-ico svg{filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}

/* Android = secondary, glassy */
.btn--android{
  background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(236,72,153,.10));
  border-color:rgba(139,92,246,.32);
  box-shadow:0 6px 18px -8px rgba(139,92,246,.45),0 0 0 1px rgba(255,255,255,.04) inset;
}
.btn--android[aria-expanded="true"] .btn-chev{transform:rotate(180deg)}

@keyframes pulse{
  0%,100%{box-shadow:0 10px 28px -8px rgba(236,72,153,.7),0 0 0 1px rgba(255,255,255,.12) inset}
  50%{box-shadow:0 14px 38px -6px rgba(236,72,153,.95),0 0 0 1px rgba(255,255,255,.2) inset}
}
@keyframes shine{
  0%{transform:translateX(-120%)}
  60%,100%{transform:translateX(120%)}
}

/* Android dropdown panel */
.android-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2px;
  font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.62);
}
.android-head b{color:#f9a8d4;font-weight:700}
.btn-back{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 10px;margin:-6px -8px;
  background:transparent;border:0;color:#f9a8d4;
  font:inherit;font-size:12px;font-weight:600;
  cursor:pointer;border-radius:8px;
  -webkit-tap-highlight-color:transparent;
}
.btn-back:active{background:rgba(236,72,153,.12)}
.step{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;
  text-decoration:none;color:#fff;
  border-radius:14px;
  background:linear-gradient(135deg,rgba(236,72,153,.14),rgba(139,92,246,.14));
  border:1px solid rgba(236,72,153,.28);
  box-shadow:
    0 6px 18px -8px rgba(236,72,153,.55),
    0 0 0 1px rgba(255,255,255,.04) inset;
  transition:transform .12s ease, box-shadow .25s ease;
}
.step:active{transform:scale(.98)}
.step-num{
  flex:0 0 auto;
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,#f472b6,#db2777);
  box-shadow:0 4px 10px -2px rgba(236,72,153,.6);
}
.step-body{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;line-height:1.2}
.step-title{font-size:14px;font-weight:700;color:#fff}
.step-hint{font-size:11px;font-weight:500;color:rgba(255,255,255,.62);margin-top:2px}
.step-arrow{
  flex:0 0 auto;
  font-size:18px;font-weight:800;color:#f9a8d4;
  transition:transform .2s ease;
}
.step:active .step-arrow{transform:translateX(3px)}
.step--primary{
  background:linear-gradient(135deg,#f472b6 0%,#ec4899 50%,#db2777 100%);
  border-color:rgba(255,255,255,.16);
  box-shadow:
    0 10px 28px -8px rgba(236,72,153,.7),
    0 0 0 1px rgba(255,255,255,.12) inset;
  position:relative;overflow:hidden;isolation:isolate;
}
.step--primary .step-num{
  background:rgba(255,255,255,.22);
  box-shadow:0 0 0 1px rgba(255,255,255,.35) inset;
}
.step--primary .step-hint{color:rgba(255,255,255,.85)}
.step--primary .step-arrow{color:#fff}

/* Ultra-small devices */
@media (max-height:640px){
  .app{gap:8px;padding-top:max(6px,env(safe-area-inset-top));padding-bottom:max(6px,env(safe-area-inset-bottom))}
  h1{font-size:16px}
  .btn{padding:10px 12px;gap:10px}

  .btn-ico svg{width:22px;height:22px}
  .btn-title{font-size:14px}

  .step-hint{font-size:10px}
  .slide{flex:0 0 50vw}
  .carousel{padding-left:25vw;padding-right:25vw}
}
@media (max-height:560px){
  .hero{display:none}
}
@media (prefers-reduced-motion:reduce){
  .btn--apple,.btn--apple::before,.install-view{animation:none}
  .carousel{scroll-behavior:auto}
}
</style>

<script>
(function(){
  /* ---- Build carousel slides (lazy-load past the 2nd) ---- */
  var TOTAL = 8;
  var carousel = document.getElementById('carousel');
  var dotsWrap = document.getElementById('dots');
  var slidesHtml = '';
  var dotsHtml = '';
  for (var n=1; n<=TOTAL; n++){
    var eager = (n <= 2);
    slidesHtml +=
      '<figure class="slide">' +
        '<picture>' +
          '<source srcset="assets/slide'+n+'.avif" type="image/avif" />' +
          '<source srcset="assets/slide'+n+'.webp" type="image/webp" />' +
          '<img src="assets/slide'+n+'.webp" alt="" width="720" height="1560"' +
            ' decoding="async"' +
            ' loading="' + (eager ? 'eager' : 'lazy') + '"' +
            (n===1 ? ' fetchpriority="high"' : '') +
          ' />' +
        '</picture>' +
      '</figure>';
    dotsHtml += '<span class="dot'+(n===1?' active':'')+'"></span>';
  }
  carousel.innerHTML = slidesHtml;
  dotsWrap.innerHTML = dotsHtml;

  var slides = carousel.children;
  var dots = dotsWrap.children;
  var current = 0;
  var autoTimer;

  function updateDots(){
    var w = carousel.clientWidth;
    var cx = carousel.scrollLeft + w/2;
    var best = 0, bestDist = Infinity;
    for (var i=0;i<slides.length;i++){
      var s = slides[i];
      var sc = s.offsetLeft + s.offsetWidth/2;
      var d = Math.abs(sc - cx);
      if (d < bestDist){ bestDist = d; best = i; }
    }
    current = best;
    for (var j=0;j<dots.length;j++) dots[j].classList.toggle('active', j===best);
  }
  carousel.addEventListener('scroll', function(){
    window.requestAnimationFrame(updateDots);
    clearTimeout(autoTimer);
    autoTimer = setTimeout(startAuto, 4500);
  }, {passive:true});

  function goTo(i){
    var s = slides[i];
    if (!s) return;
    var target = s.offsetLeft - (carousel.clientWidth - s.offsetWidth)/2;
    carousel.scrollTo({left: target, behavior:'smooth'});
  }
  function startAuto(){
    clearInterval(autoTimer);
    autoTimer = setInterval(function(){
      var next = (current + 1) % slides.length;
      goTo(next);
    }, 3200);
  }
  window.addEventListener('load', function(){
    goTo(0);
    updateDots();
    setTimeout(startAuto, 1800);
  });
  window.addEventListener('resize', function(){ goTo(current); });

  /* ---- Install conversion hook ---- */
  function fire(){
    try { if (typeof window.__onInstallClick === 'function') window.__onInstallClick(); } catch(e){}
  }
  document.querySelector('.js-install-apple').addEventListener('click', fire);
  var androidLinks = document.querySelectorAll('.js-install-android');
  for (var a=0;a<androidLinks.length;a++) androidLinks[a].addEventListener('click', fire);

  /* ---- Android dropdown toggle (in-place view swap) ---- */
  var viewChoose = document.getElementById('view-choose');
  var viewAndroid = document.getElementById('view-android');
  var openBtn = document.querySelector('.js-android-open');
  var closeBtn = document.querySelector('.js-android-close');

  function showAndroid(){
    viewChoose.hidden = true;
    viewAndroid.hidden = false;
    openBtn.setAttribute('aria-expanded','true');
    // Re-trigger entrance animation
    viewAndroid.style.animation = 'none';
    // Force reflow without referencing the result (prevents minifier dead-code elimination)
    void viewAndroid.offsetWidth;
    viewAndroid.style.animation = '';
  }
  function showChoose(){
    viewAndroid.hidden = true;
    viewChoose.hidden = false;
    openBtn.setAttribute('aria-expanded','false');
    viewChoose.style.animation = 'none';
    void viewChoose.offsetWidth;
    viewChoose.style.animation = '';
  }
  openBtn.addEventListener('click', showAndroid);
  closeBtn.addEventListener('click', showChoose);
})();
</script>
