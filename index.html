<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
/* Paint dark color on the root element itself — covers iOS Safari's overscroll area,
   address-bar reveal, and any gap caused by 100dvh rounding. */
html{
  background-color:#0a0122;
  background-image:radial-gradient(120% 80% at 50% 0%, #3a0d5c 0%, #220646 35%, #110223 70%, #07001a 100%);
  background-repeat:no-repeat;
  height:100%;width:100%;
  overflow:hidden;
}
body{
  height:100%;width:100%;
  overflow:hidden;
  overscroll-behavior:none;
  position:fixed;inset:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  color:#fff;
  background-color:#0a0122;
  /* NOTE: no background-attachment:fixed — iOS Safari renders it incorrectly */
  background-image:
    radial-gradient(60% 40% at 10% 15%, rgba(236, 72, 153, .18), transparent 60%),
    radial-gradient(55% 35% at 90% 85%, rgba(139, 92, 246, .22), transparent 60%),
    radial-gradient(120% 80% at 50% 0%, #3a0d5c 0%, #220646 35%, #110223 70%, #07001a 100%);
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}
.app{
  position:relative;z-index:1;
  height:100%;height:100dvh;
  display:flex;flex-direction:column;
  padding:max(14px,env(safe-area-inset-top)) 16px max(14px,env(safe-area-inset-bottom));
  gap:14px;
}
/* ---- TITLE ---- */
.hero{flex:0 0 auto;text-align:center;padding:4px 6px 0}
.kicker{
  display:inline-block;
  font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:#f9a8d4;
  padding:6px 14px;border-radius:999px;
  background:rgba(236,72,153,.10);
  border:1px solid rgba(236,72,153,.28);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
h1{
  margin-top:10px;
  font-size:clamp(20px,6.2vw,28px);
  font-weight:800;line-height:1.15;letter-spacing:-.01em;
  color:#fff;
  text-shadow:0 2px 24px rgba(236,72,153,.35),0 1px 2px rgba(0,0,0,.6);
}
h1 .grad{
  background:linear-gradient(90deg,#fff 0%,#fce7f3 50%,#f9a8d4 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.sub{
  margin-top:6px;
  font-size:clamp(12px,3.4vw,14px);font-weight:500;
  color:rgba(255,255,255,.78);
  letter-spacing:.01em;
}
/* ---- CAROUSEL ---- */
.carousel-wrap{flex:1 1 auto;min-height:0;position:relative}
.carousel{
  height:100%;
  display:flex;gap:14px;
  overflow-x:auto;overflow-y:hidden;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
  padding:4px 20vw 4px 20vw;
  scrollbar-width:none;
}
.carousel::-webkit-scrollbar{display:none}
.slide{
  flex:0 0 60vw;max-width:300px;
  height:100%;
  scroll-snap-align:center;
  position:relative;
  border-radius:22px;
  overflow:hidden;
  background:#1a0830;
  box-shadow:
    0 20px 50px -15px rgba(0,0,0,.75),
    0 0 0 1px rgba(236,72,153,.22),
    0 0 40px -10px rgba(236,72,153,.35);
  transform:translateZ(0);
  transition:transform .35s ease;
}
.slide picture{display:block;width:100%;height:100%}
.slide img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  pointer-events:none;
}
.slide::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 70%,rgba(12,2,26,.55) 100%);
}
/* dots */
.dots{
  position:absolute;left:0;right:0;bottom:-2px;
  display:flex;justify-content:center;gap:6px;
  pointer-events:none;
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.28);
  transition:background .25s ease,width .25s ease;
}
.dot.active{background:#ec4899;width:18px;border-radius:3px}
/* ---- CTA ---- */
.cta-wrap{flex:0 0 auto;display:flex;justify-content:center;padding:0 4px}
.cta{
  position:relative;
  width:100%;max-width:360px;
  padding:18px 28px;
  font:inherit;font-size:17px;font-weight:800;letter-spacing:.14em;
  color:#fff;text-transform:uppercase;
  border:0;border-radius:18px;
  cursor:pointer;
  background:linear-gradient(135deg,#f472b6 0%,#ec4899 50%,#db2777 100%);
  box-shadow:
    0 10px 30px -8px rgba(236,72,153,.7),
    0 0 0 1px rgba(255,255,255,.12) inset,
    0 -4px 12px rgba(0,0,0,.2) inset;
  overflow:hidden;
  isolation:isolate;
  animation:pulse 2.4s ease-in-out infinite;
  transition:transform .12s ease;
  -webkit-appearance:none;appearance:none;
}
.cta:active{transform:scale(.97)}
.cta::before{
  content:"";position:absolute;inset:0;z-index:-1;
  background:linear-gradient(120deg,transparent 20%,rgba(255,255,255,.55) 50%,transparent 80%);
  transform:translateX(-120%);
  animation:shine 2.8s ease-in-out infinite;
}
.cta::after{
  content:"";position:absolute;inset:-3px;z-index:-2;border-radius:21px;
  background:linear-gradient(135deg,#f9a8d4,#ec4899,#a855f7,#ec4899);
  background-size:300% 300%;
  filter:blur(14px);opacity:.55;
  animation:glow 4s ease infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 10px 30px -8px rgba(236,72,153,.7),0 0 0 1px rgba(255,255,255,.12) inset,0 -4px 12px rgba(0,0,0,.2) inset}
  50%{box-shadow:0 14px 40px -6px rgba(236,72,153,.95),0 0 0 1px rgba(255,255,255,.2) inset,0 -4px 12px rgba(0,0,0,.2) inset}
}
@keyframes shine{
  0%{transform:translateX(-120%)}
  60%,100%{transform:translateX(120%)}
}
@keyframes glow{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}
/* Ultra-small devices fallback */
@media (max-height:600px){
  h1{font-size:18px}
  .sub{font-size:11px}
  .kicker{font-size:10px;padding:4px 10px}
  .cta{padding:14px 24px;font-size:15px}
  .app{gap:10px}
}
/* Reduced motion */
@media (prefers-reduced-motion:reduce){
  .cta,.cta::before,.cta::after{animation:none}
  .carousel{scroll-behavior:auto}
}
</style>

<main class="app">

  <div class="cta-wrap">
    <button class="cta" id="installBtn" type="button" aria-label="Instalar la aplicacion">INSTALAR</button>
  </div>
</main>

<script>
(function(){
  /* ---- Carousel dots + autoplay ---- */
  var carousel = document.getElementById('carousel');
  var dots = document.getElementById('dots').children;
  var slides = carousel.children;
  var current = 0;
  var autoTimer;

  function updateDots(){
    var w = carousel.clientWidth;
    var idx = Math.round(carousel.scrollLeft / (w * 0.6 + 14));
    // better: find closest slide center
    var cx = carousel.scrollLeft + w/2;
    var best = 0, bestDist = Infinity;
    for (var i=0;i<slides.length;i++){
      var s = slides[i];
      var sc = s.offsetLeft + s.offsetWidth/2;
      var d = Math.abs(sc - cx);
      if (d < bestDist){ bestDist = d; best = i; }
    }
    current = best;
    for (var j=0;j<dots.length;j++) dots[j].classList.toggle('active', j===best);
  }
  carousel.addEventListener('scroll', function(){
    window.requestAnimationFrame(updateDots);
    clearTimeout(autoTimer);
    autoTimer = setTimeout(startAuto, 4500);
  }, {passive:true});

  function goTo(i){
    var s = slides[i];
    if (!s) return;
    var target = s.offsetLeft - (carousel.clientWidth - s.offsetWidth)/2;
    carousel.scrollTo({left: target, behavior:'smooth'});
  }
  function startAuto(){
    clearInterval(autoTimer);
    autoTimer = setInterval(function(){
      var next = (current + 1) % slides.length;
      goTo(next);
    }, 3200);
  }
  // initial center
  window.addEventListener('load', function(){
    goTo(0);
    updateDots();
    setTimeout(startAuto, 1800);
  });
  window.addEventListener('resize', function(){ goTo(current); });

  /* ---- INSTALL click -> conversion hook + redirect ---- */
  /* Attach your analytics/pixel conversion inside window.__onInstallClick.
     It is awaited (up to 150ms) so the pixel beacon has time to leave
     before the browser navigates to the App Store. */
  document.getElementById('installBtn').addEventListener('click', function(){
    try {
      if (typeof window.__onInstallClick === 'function') window.__onInstallClick();
    } catch(e){}
    setTimeout(function(){
      if (INSTALL_URL && INSTALL_URL !== '#') {
        window.location.href = INSTALL_URL;
      }
    }, 150);
  });
})();
</script>
