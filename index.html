<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{
  background-color:#0a0122;
  background-image:radial-gradient(120% 80% at 50% 0%, #3a0d5c 0%, #220646 35%, #110223 70%, #07001a 100%);
  background-repeat:no-repeat;
  height:100%;width:100%;
  overflow:hidden;
}
body{
  height:100%;width:100%;
  overflow:hidden;
  overscroll-behavior:none;
  position:fixed;inset:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  color:#fff;
  background-color:#0a0122;
  background-image:
    radial-gradient(60% 40% at 10% 15%, rgba(236, 72, 153, .18), transparent 60%),
    radial-gradient(55% 35% at 90% 85%, rgba(139, 92, 246, .22), transparent 60%),
    radial-gradient(120% 80% at 50% 0%, #3a0d5c 0%, #220646 35%, #110223 70%, #07001a 100%);
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}
.app{
  position:relative;z-index:1;
  height:100%;height:100dvh;
  display:flex;flex-direction:column;
  padding:max(10px,env(safe-area-inset-top)) 16px max(10px,env(safe-area-inset-bottom));
  gap:10px;
}
/* ---- TITLE ---- */
.hero{flex:0 0 auto;text-align:center;padding:2px 6px 0}
.kicker{
  display:inline-block;
  font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:#f9a8d4;
  padding:5px 12px;border-radius:999px;
  background:rgba(236,72,153,.10);
  border:1px solid rgba(236,72,153,.28);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
h1{
  margin-top:8px;
  font-size:clamp(18px,5.4vw,24px);
  font-weight:800;line-height:1.15;letter-spacing:-.01em;
  color:#fff;
  text-shadow:0 2px 24px rgba(236,72,153,.35),0 1px 2px rgba(0,0,0,.6);
}
h1 .grad{
  background:linear-gradient(90deg,#fff 0%,#fce7f3 50%,#f9a8d4 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
/* ---- CAROUSEL ---- */
.carousel-wrap{flex:1 1 auto;min-height:0;position:relative}
.carousel{
  height:100%;
  display:flex;gap:14px;
  overflow-x:auto;overflow-y:hidden;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
  padding:4px 22vw 4px 22vw;
  scrollbar-width:none;
}
.carousel::-webkit-scrollbar{display:none}
.slide{
  flex:0 0 56vw;max-width:280px;
  height:100%;
  scroll-snap-align:center;
  position:relative;
  border-radius:22px;
  overflow:hidden;
  background:#1a0830;
  box-shadow:
    0 20px 50px -15px rgba(0,0,0,.75),
    0 0 0 1px rgba(236,72,153,.22),
    0 0 40px -10px rgba(236,72,153,.35);
  transform:translateZ(0);
  transition:transform .35s ease;
}
.slide picture{display:block;width:100%;height:100%}
.slide img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  pointer-events:none;
}
.slide::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 70%,rgba(12,2,26,.55) 100%);
}
/* dots */
.dots{
  position:absolute;left:0;right:0;bottom:-2px;
  display:flex;justify-content:center;gap:6px;
  pointer-events:none;
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.28);
  transition:background .25s ease,width .25s ease;
}
.dot.active{background:#ec4899;width:18px;border-radius:3px}
/* ---- INSTALL STEPS ---- */
.steps-wrap{flex:0 0 auto;display:flex;flex-direction:column;gap:8px}
.steps-intro{
  text-align:center;
  font-size:12px;font-weight:600;letter-spacing:.02em;
  color:rgba(255,255,255,.78);
  text-transform:uppercase;
}
.steps-intro b{color:#f9a8d4;font-weight:700}
.step{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;
  text-decoration:none;color:#fff;
  border-radius:14px;
  background:linear-gradient(135deg,rgba(236,72,153,.14),rgba(139,92,246,.14));
  border:1px solid rgba(236,72,153,.28);
  box-shadow:
    0 6px 18px -8px rgba(236,72,153,.55),
    0 0 0 1px rgba(255,255,255,.04) inset;
  transition:transform .12s ease, box-shadow .25s ease;
  -webkit-tap-highlight-color:transparent;
}
.step:active{transform:scale(.98)}
.step-num{
  flex:0 0 auto;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,#f472b6,#db2777);
  box-shadow:0 4px 10px -2px rgba(236,72,153,.6);
}
.step-body{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;line-height:1.2}
.step-title{font-size:14px;font-weight:700;color:#fff}
.step-hint{font-size:11px;font-weight:500;color:rgba(255,255,255,.62);margin-top:2px}
.step-arrow{
  flex:0 0 auto;
  font-size:18px;font-weight:800;color:#f9a8d4;
  transform:translateX(0);
  transition:transform .2s ease;
}
.step:active .step-arrow{transform:translateX(3px)}
/* Step 2 — the actual install — gets the pulsing glow */
.step--primary{
  background:linear-gradient(135deg,#f472b6 0%,#ec4899 50%,#db2777 100%);
  border-color:rgba(255,255,255,.16);
  box-shadow:
    0 10px 28px -8px rgba(236,72,153,.7),
    0 0 0 1px rgba(255,255,255,.12) inset;
  position:relative;overflow:hidden;isolation:isolate;
  animation:pulse 2.4s ease-in-out infinite;
}
.step--primary::before{
  content:"";position:absolute;inset:0;z-index:-1;
  background:linear-gradient(120deg,transparent 20%,rgba(255,255,255,.45) 50%,transparent 80%);
  transform:translateX(-120%);
  animation:shine 2.8s ease-in-out infinite;
}
.step--primary .step-num{
  background:rgba(255,255,255,.22);
  box-shadow:0 0 0 1px rgba(255,255,255,.35) inset;
}
.step--primary .step-hint{color:rgba(255,255,255,.85)}
.step--primary .step-arrow{color:#fff}
@keyframes pulse{
  0%,100%{box-shadow:0 10px 28px -8px rgba(236,72,153,.7),0 0 0 1px rgba(255,255,255,.12) inset}
  50%{box-shadow:0 14px 38px -6px rgba(236,72,153,.95),0 0 0 1px rgba(255,255,255,.2) inset}
}
@keyframes shine{
  0%{transform:translateX(-120%)}
  60%,100%{transform:translateX(120%)}
}
/* Ultra-small devices */
@media (max-height:640px){
  .app{gap:8px;padding-top:max(6px,env(safe-area-inset-top));padding-bottom:max(6px,env(safe-area-inset-bottom))}
  h1{font-size:16px;margin-top:6px}
  .kicker{font-size:9px;padding:3px 10px;letter-spacing:.18em}
  .steps-intro{font-size:11px}
  .step{padding:9px 12px;gap:10px}
  .step-num{width:24px;height:24px;font-size:12px}
  .step-title{font-size:13px}
  .step-hint{font-size:10px}
  .slide{flex:0 0 50vw}
  .carousel{padding-left:25vw;padding-right:25vw}
}
@media (max-height:560px){
  h1{display:none}
  .kicker{display:none}
  .hero{display:none}
}
@media (prefers-reduced-motion:reduce){
  .step--primary,.step--primary::before{animation:none}
  .carousel{scroll-behavior:auto}
}
</style>
</head>
<body>
<main class="app">
  <header class="hero">
    <span class="kicker">Roleplay &middot; AI &middot; Anime</span>
    <h1>Chat with your favorite <span class="grad">anime characters</span></h1>
  </header>

          <source srcset="assets/screen2.webp" type="image/webp" />

    <a class="step js-install" href="https://groups.google.com/g/testimgoogleplay" target="_blank" rel="noopener noreferrer">
      <span class="step-num">1</span>

        <span class="step-hint">Use your Google account</span>
      </span>
      <span class="step-arrow" aria-hidden="true">&rsaquo;</span>
    </a>

    <a class="step step--primary js-install" href="https://play.google.com/store/apps/details?id=com.kalahanov.bookTalkAi" target="_blank" rel="noopener noreferrer">
      <span class="step-num">2</span>
      <span class="step-body">
        <span class="step-title">Install the app</span>
        <span class="step-hint">Open in Google Play</span>
      </span>
      <span class="step-arrow" aria-hidden="true">&rsaquo;</span>
    </a>
  </div>
</main>

<script>
(function(){
  /* ---- Carousel dots + autoplay ---- */
  var carousel = document.getElementById('carousel');
  var dots = document.getElementById('dots').children;
  var slides = carousel.children;
  var current = 0;
  var autoTimer;

  function updateDots(){
    var w = carousel.clientWidth;
    var cx = carousel.scrollLeft + w/2;
    var best = 0, bestDist = Infinity;
    for (var i=0;i<slides.length;i++){
      var s = slides[i];
      var sc = s.offsetLeft + s.offsetWidth/2;
      var d = Math.abs(sc - cx);
      if (d < bestDist){ bestDist = d; best = i; }
    }
    current = best;
    for (var j=0;j<dots.length;j++) dots[j].classList.toggle('active', j===best);
  }
  carousel.addEventListener('scroll', function(){
    window.requestAnimationFrame(updateDots);
    clearTimeout(autoTimer);
    autoTimer = setTimeout(startAuto, 4500);
  }, {passive:true});

  function goTo(i){
    var s = slides[i];
    if (!s) return;
    var target = s.offsetLeft - (carousel.clientWidth - s.offsetWidth)/2;
    carousel.scrollTo({left: target, behavior:'smooth'});
  }
  function startAuto(){
    clearInterval(autoTimer);
    autoTimer = setInterval(function(){
      var next = (current + 1) % slides.length;
      goTo(next);
    }, 3200);
  }
  window.addEventListener('load', function(){
    goTo(0);
    updateDots();
    setTimeout(startAuto, 1800);
  });
  window.addEventListener('resize', function(){ goTo(current); });

  /* ---- Install step taps -> conversion hook (links navigate naturally) ---- */
  var stepLinks = document.querySelectorAll('.js-install');
  for (var k=0;k<stepLinks.length;k++){
    stepLinks[k].addEventListener('click', function(){
      try {
        if (typeof window.__onInstallClick === 'function') window.__onInstallClick();
      } catch(e){}
    });
  }
})();
</script>
